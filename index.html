<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chino 99 Pro</title>
    <style>
        /* --- 网页界面样式 --- */
        body {
            font-family: -apple-system, sans-serif;
            background: #f4f7f6;
            margin: 0;
            padding: 10px;
        }

        .app-container {
            max-width: 800px;
            margin: auto;
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 1px 5px rgba(0, 0, 0, 0.1);
        }

        h2 {
            color: #00796b;
            text-align: center;
            margin: 5px 0 15px;
            font-size: 22px;
        }

        .inputs {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            margin-bottom: 15px;
        }

        input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 15px;
            width: 130px;
            outline: none;
        }

        .btn-row {
            display: flex;
            gap: 6px;
            margin: 10px 0;
            justify-content: center;
        }

        button {
            padding: 10px 18px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
        }

        .b-add {
            background: #4db6ac;
        }

        .b-print {
            background: #546e7a;
        }

        .b-clear {
            background: #e57373;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            margin-top: 10px;
        }

        th {
            background: #e0f2f1;
            padding: 10px;
            border: 1px solid #eee;
            color: #333;
        }

        td {
            padding: 10px;
            border: 1px solid #eee;
            text-align: center;
            word-break: break-all;
        }

        .editable {
            background: #fffde7;
            font-weight: bold;
        }

        .total-banner {
            text-align: right;
            font-size: 24px;
            font-weight: bold;
            margin-top: 15px;
            color: #c62828;
        }

        .btn-del {
            background: #ff5252;
            color: #fff;
            border: none;
            padding: 5px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: bold;
        }

        /* --- 打印样式控制 --- */
        @media print {
            @page {
                margin: 0;
            }

            body>*:not(#print-receipt) {
                display: none !important;
            }

            #print-receipt {
                display: block !important;
                width: 76mm;
                margin: 0;
                padding: 4mm;
                background: #fff;
                font-family: 'Courier New', monospace;
                color: #000;
            }

            .p-header {
                border-bottom: 2px solid #000;
                padding-bottom: 2mm;
                margin-bottom: 2mm;
                text-align: center;
            }

            .p-name {
                font-size: 18pt;
                font-weight: 900;
            }

            .p-contact {
                font-size: 9.5pt;
                line-height: 1.3;
                text-align: left;
                font-weight: bold;
                margin-bottom: 2mm;
            }

            .p-table {
                display: table;
                width: 100%;
                border-collapse: collapse;
            }

            .p-row {
                display: table-row;
            }

            .p-row.p-head {
                font-weight: 900;
                border-bottom: 1.5px solid #000;
            }

            .p-col {
                display: table-cell;
                vertical-align: middle;
                padding: 1.2mm 0;
                font-size: 10.5pt;
                font-weight: normal;
            }

            .p-head .p-col {
                font-weight: bold;
            }

            .c-cod {
                width: 16%;
                text-align: left;
            }

            .c-art {
                width: 38%;
                text-align: left;
                padding-right: 1mm;
                word-break: break-all;
                white-space: normal;
                line-height: 1.1;
            }

            .c-can {
                width: 12%;
                text-align: center;
            }

            .c-uni {
                width: 14%;
                text-align: center;
            }

            .c-val {
                width: 20%;
                text-align: right;
            }

            .p-total {
                text-align: right;
                font-size: 16pt;
                font-weight: 900;
                margin-top: 3mm;
                border-top: 2px solid #000;
                padding-top: 2mm;
            }

            .p-footer {
                text-align: center;
                font-size: 10pt;
                margin-top: 4mm;
                font-weight: normal;
                border-top: none;
                padding-top: 2mm;
            }
        }

        #print-receipt {
            display: none;
        }
    </style>
</head>

<body>

    <div class="app-container">
        <h2>✨ Chino 99</h2>
        <div class="inputs">
            <input id="inCod" placeholder="Código">
            <input id="inArt" placeholder="Producto">
            <input id="inCan" type="number" placeholder="Cantidad" oninput="this.value=this.value.replace(/\D/g,'')">
            <input id="inPre" type="number" placeholder="Unidad ($)"
                oninput="this.value=this.value.replace(/[^\d.]/g,'')">
        </div>
        <div class="btn-row">
            <button class="b-add" onclick="addItem()">Agregar</button>
            <button class="b-print" onclick="window.print()">Imprimir</button>
            <button class="b-clear" onclick="clearList()">Limpiar</button>
        </div>
        <div style="overflow-x:auto;">
            <table>
                <thead>
                    <tr>
                        <th style="width:15%">Código</th>
                        <th style="width:30%">Producto</th>
                        <th style="width:10%">Cantidad</th>
                        <th style="width:15%">Unidad</th>
                        <th style="width:15%">Valor</th>
                        <th style="width:15%">Acciones</th>
                    </tr>
                </thead>
                <tbody id="mainList"></tbody>
            </table>
        </div>
        <div class="total-banner" id="totalShow">Total: $0.00</div>
    </div>

    <div id="print-receipt">
        <div class="p-header">
            <div class="p-name">CHINO 99</div>
            <div class="p-contact">
                RUT: 76781806-8<br>
                WhatsApp: +56990987447<br>
                DIRECCIÓN: Sazié 2765<br>
                <span id="p-dt"></span>
            </div>
        </div>
        <div class="p-table">
            <div class="p-row p-head">
                <div class="p-col c-cod">COD</div>
                <div class="p-col c-art">ARTICULO</div>
                <div class="p-col c-can">CANT</div>
                <div class="p-col c-uni">UND</div>
                <div class="p-col c-val">VALOR</div>
            </div>
            <div id="p-items" style="display: contents;"></div>
        </div>
        <div class="p-total">TOTAL: $<span id="p-total-sum"></span></div>
        <div class="p-footer">¡Gracias por su compra!</div>
    </div>

    <script>
        let inventory = {};

        fetch("https://docs.google.com/spreadsheets/d/1_XquIN3Qervm2532YWbA8-3O48RUbLgTp7ywRwIGx1I/export?format=csv&v=" + Date.now())
            .then(r => r.text())
            .then(csv => {
                csv.split("\n").slice(1).forEach(row => {
                    let cols = row.split(",");
                    if (cols[0]) inventory[cols[0].trim()] = { n: cols[1].trim(), p1: parseFloat(cols[2]), p2: parseFloat(cols[3]) };
                });
            });

        const icod = document.getElementById("inCod"), iart = document.getElementById("inArt"), ican = document.getElementById("inCan"), ipre = document.getElementById("inPre");

        // 绑定数量改变时自动更新单价的逻辑
        ican.addEventListener('input', updatePrice);

        icod.oninput = () => {
            let code = icod.value.trim();
            if (code !== "" && inventory.hasOwnProperty(code)) {
                iart.value = inventory[code].n;
                updatePrice();
            } else { iart.value = ""; ipre.value = ""; }
        };

        function updatePrice() {
            let code = icod.value.trim();
            let item = inventory[code];
            if (item && ican.value) {
                ipre.value = (parseInt(ican.value) >= 3) ? item.p2 : item.p1;
            }
        }

        function addItem() {
            if (!icod.value.trim() || !iart.value.trim() || !ican.value || !ipre.value) {
                alert("Completa todos los campos correctamente.");
                return;
            }
            let tr = document.createElement("tr");
            tr.dataset.cod = icod.value.trim();
            tr.innerHTML = `
                <td>${tr.dataset.cod}</td>
                <td>${iart.value}</td>
                <td contenteditable="true" class="editable v-can">${ican.value}</td>
                <td contenteditable="true" class="editable v-pre">${ipre.value}</td>
                <td class="row-subtotal">${(ican.value * ipre.value).toFixed(2)}</td>
                <td><button class="btn-del" onclick="this.parentElement.parentElement.remove();sync();">ELIMINAR</button></td>
            `;
            document.getElementById("mainList").appendChild(tr);
            tr.querySelectorAll('.editable').forEach(cell => {
                cell.addEventListener('input', () => {
                    // 同样在可编辑表格里过滤非数字（防止手动修改时输入文字）
                    if (cell.classList.contains('v-can')) cell.innerText = cell.innerText.replace(/\D/g, '');
                    else cell.innerText = cell.innerText.replace(/[^\d.]/g, '');

                    let can = parseFloat(tr.querySelector('.v-can').innerText) || 0;
                    let preCell = tr.querySelector('.v-pre');
                    let item = inventory[tr.dataset.cod];
                    if (item && cell.classList.contains('v-can')) preCell.innerText = (can >= 3) ? item.p2 : item.p1;
                    tr.querySelector('.row-subtotal').innerText = (can * (parseFloat(preCell.innerText) || 0)).toFixed(2);
                    sync();
                });
            });
            sync(); icod.value = iart.value = ican.value = ipre.value = ""; icod.focus();
        }

        function sync() {
            let total = 0, pBox = document.getElementById("p-items");
            pBox.innerHTML = "";
            document.querySelectorAll("#mainList tr").forEach(r => {
                let can = r.querySelector('.v-can').innerText;
                let pre = r.querySelector('.v-pre').innerText;
                let sub = (parseFloat(can) * parseFloat(pre)).toFixed(2);
                total += parseFloat(sub);
                pBox.innerHTML += `
                    <div class="p-row">
                        <div class="p-col c-cod">${r.children[0].innerText}</div>
                        <div class="p-col c-art">${r.children[1].innerText}</div>
                        <div class="p-col c-can">${can}</div>
                        <div class="p-col c-uni">${pre}</div>
                        <div class="p-col c-val">${sub}</div>
                    </div>`;
            });
            document.getElementById("totalShow").innerText = "Total: $" + total.toFixed(2);
            document.getElementById("p-total-sum").innerText = total.toFixed(2);

            let n = new Date();
            const y = n.getFullYear();
            const m = n.getMonth() + 1;
            const d = n.getDate();
            const hh = String(n.getHours()).padStart(2, '0');
            const mm = String(n.getMinutes()).padStart(2, '0');
            const ss = String(n.getSeconds()).padStart(2, '0');
            document.getElementById("p-dt").innerText = `FECHA: ${y}/${m}/${d}, ${hh}:${mm}:${ss}`;
        }

        function clearList() { if (confirm("¿Limpiar?")) { document.getElementById("mainList").innerHTML = ""; sync(); } }
    </script>
</body>

</html>
