<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chino 99 Pro</title>
</head>

<body>

<h2>CHINO 99</h2>

Código: <input id="inCod"><br>
Producto: <input id="inArt"><br>
Cantidad: <input id="inCan"><br>
Precio: <input id="inPre"><br><br>

<button onclick="addItem()">Agregar</button>
<button onclick="sendToPrinter()">Imprimir</button>
<button onclick="clearList()">Limpiar</button>

<hr>

<table border="1" width="100%">
<thead>
<tr>
<th>Cod</th>
<th>Producto</th>
<th>Cant</th>
<th>Precio</th>
<th>Subtotal</th>
<th>Acción</th>
</tr>
</thead>
<tbody id="mainList"></tbody>
</table>

<h3 id="totalShow">Total: $0</h3>

<script>

let inventory = {};
let icod = document.getElementById("inCod");
let iart = document.getElementById("inArt");
let ican = document.getElementById("inCan");
let ipre = document.getElementById("inPre");

function formatCLP(n){
    return Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g,".");
}

function addItem(){

    if(!icod.value || !iart.value || !ican.value || !ipre.value){
        alert("Completa datos");
        return;
    }

    let tr = document.createElement("tr");

    let sub = ican.value * ipre.value;

    tr.innerHTML = `
        <td>${icod.value}</td>
        <td>${iart.value}</td>
        <td contenteditable="true" class="can">${ican.value}</td>
        <td contenteditable="true" class="pre">${ipre.value}</td>
        <td class="sub">${formatCLP(sub)}</td>
        <td><button onclick="removeItem(this)">X</button></td>
    `;

    document.getElementById("mainList").appendChild(tr);

    tr.querySelectorAll('.can,.pre').forEach(el=>{
        el.oninput=()=>updateRow(tr);
    });

    sync();

    icod.value=iart.value=ican.value=ipre.value="";
}

function updateRow(tr){
    let can = parseFloat(tr.querySelector('.can').innerText)||0;
    let pre = parseFloat(tr.querySelector('.pre').innerText)||0;
    let sub = can*pre;

    tr.querySelector('.sub').innerText = formatCLP(sub);

    sync();
}

function removeItem(btn){
    btn.parentNode.parentNode.remove();
    sync();
}

function sync(){

    let total=0;

    document.querySelectorAll("#mainList tr").forEach(r=>{
        let val = r.querySelector('.sub').innerText.replace(/\./g,'');
        total+=parseFloat(val)||0;
    });

    document.getElementById("totalShow").innerText = "Total: $" + formatCLP(total);
}

function clearList(){
    document.getElementById("mainList").innerHTML="";
    sync();
}

/* ✅ 打印（核心） */
function sendToPrinter(){

    let items=[];

    document.querySelectorAll("#mainList tr").forEach(r=>{
        let cod = r.children[0].innerText;
        let art = r.children[1].innerText;
        let can = r.querySelector('.can').innerText;
        let sub = r.querySelector('.sub').innerText.replace(/\./g,'');

        items.push({cod,art,can,sub});
    });

    let total = document.getElementById("totalShow").innerText.replace(/[^\d]/g,'');

    fetch("http://192.168.1.81:3000/print",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            items:items,
            total:total
        })
    }).then(()=>{
        alert("🧾 已发送打印");
    });

}

</script>

</body>
</html>
