<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="format-detection" content="telephone=no">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chino 99 Pro</title>
    <style>
        /* --- 网页界面样式 --- */
        body {
            font-family: -apple-system, sans-serif;
            background: #f4f7f6;
            margin: 0;
            padding: 10px;
        }

        .app-container {
            max-width: 800px;
            margin: auto;
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 1px 5px rgba(0, 0, 0, 0.1);
        }

        h2 {
            color: #00796b;
            text-align: center;
            margin: 5px 0 15px;
            font-size: 22px;
        }

        .inputs {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 8px;
            margin-bottom: 15px;
        }

        input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
            width: 100%;
            box-sizing: border-box;
            outline: none;
        }

        .btn-row {
            display: flex;
            gap: 6px;
            margin: 10px 0;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 18px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            min-width: 80px;
        }

        .b-add {
            background: #4db6ac;
            flex: 1;
        }

        .b-print {
            background: #546e7a;
            flex: 1;
        }

        .b-clear {
            background: #e57373;
            flex: 1;
        }

        .table-wrapper {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin-top: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            min-width: 600px;
            table-layout: fixed;
        }

        th {
            background: #e0f2f1;
            padding: 10px;
            border: 1px solid #eee;
            color: #333;
        }

        td {
            padding: 10px;
            border: 1px solid #eee;
            text-align: center;
            word-break: break-all;
        }

        .col-cant {
            width: 15% !important;
        }

        .editable {
            background: #fffde7;
            font-weight: bold;
            outline: none;
            border: 1px solid #ffe082;
            display: block;
            padding: 8px 4px;
            min-height: 20px;
        }

        .total-banner {
            text-align: right;
            font-size: 24px;
            font-weight: bold;
            margin-top: 15px;
            color: #c62828;
        }

        /* 彻底简化的删除按钮，去掉点和修饰 */
        .btn-del {
            background: #ff5252;
            color: #fff;
            border: none;
            padding: 10px 0;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            width: 90%;
            cursor: pointer;
            outline: none;
            box-shadow: none;
            -webkit-appearance: none;
        }

        /* --- 打印样式控制 (80mm 适配版) --- */
        @media print {
            @page {
                size: 80mm;
                margin: 0;
            }

            a {
                text-decoration: none !important;
                color: #000 !important;
            }

            body>*:not(#print-receipt) {
                display: none !important;
            }

            #print-receipt {
                display: block !important;
                width: 72mm;
                margin: 0 auto;
                padding: 3mm 2mm;
                background: #fff;
                font-family: 'Courier New', monospace;
                color: #000;
                font-weight:bold;
            }

            .p-header {
                border-bottom: 1px dashed #000;
                padding-bottom: 2mm;
                margin-bottom: 3mm;
                text-align: center;
            }

            .p-name {
                font-size: 18pt;
                font-weight: bold;
                margin-bottom: 3mm;
                text-align: center;
            }

            .p-contact {
                font-size: 10pt;
                line-height: 1.4;
                text-align: left;
            }

            .p-table {
                display: table;
                width: 100%;
                border-collapse: collapse;
            }

            .p-row {
                display: table-row;
            }

            .p-row.p-head {
                font-weight: bold;
                border-bottom: 1px dashed #000;
            }

            .p-col {
                display: table-cell;
                letter-spacing:0.3px;
                padding: 1.5mm 0;
                font-size: 10pt;
            }

            .c-cod {
                width: 18%;
                text-align: left;
            }

            .c-art {
                width: 32%;
                text-align: left;
                word-break: break-all;
                line-height: 1.1;
            }

            .c-can {
                width: 12%;
                text-align: center;
            }

            .c-uni {
                width: 16%;
                text-align: center;
            }

            .c-val {
                width: 22%;
                text-align: right;
            }

            .p-total {
                display: flex;
                justify-content: space-between;
                font-size: 12pt;
                font-weight: normal;
                margin-top: 4mm;
                border-top: 2px dashed #000;
                padding-top: 2mm;
            }

            .p-footer {
                text-align: center;
                font-size: 10pt;
                margin-top: 5mm;
            }
        }

        #print-receipt {
            display: none;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <h2>✨ Chino 99</h2>
        <div class="inputs">
            <input id="inCod" placeholder="Código">
            <input id="inArt" placeholder="Producto">
            <input id="inCan" type="number" placeholder="Cantidad" oninput="this.value=this.value.replace(/\D/g,'')">
            <input id="inPre" type="number" placeholder="Unidad ($)"
                oninput="this.value=this.value.replace(/[^\d.]/g,'')">
        </div>
        <div class="btn-row">
            <button class="b-add" onclick="addItem()">Agregar</button>
            <button class="b-print" onclick="window.print()">Imprimir</button>
            <button class="b-clear" onclick="clearList()">Limpiar</button>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th style="width:15%">Código</th>
                        <th style="width:25%">Producto</th>
                        <th class="col-cant">Cant</th>
                        <th style="width:15%">Unidad</th>
                        <th style="width:15%">Valor</th>
                        <th style="width:15%">Acciones</th>
                    </tr>
                </thead>
                <tbody id="mainList"></tbody>
            </table>
        </div>
        <div class="total-banner" id="totalShow">Total: $0</div>
    </div>

    <div id="print-receipt">
        <div class="p-header">
            <div class="p-name">CHINO 99</div>
            <div class="p-contact">
                RUT: 76781806-8<br>
                WhatsApp: +56990987447<br>
                DIRECCIÓN: Sazié 2765<br>
                <span id="p-dt"></span>
            </div>
        </div>
        <div class="p-table">
            <div class="p-row p-head">
                <div class="p-col c-cod">COD</div>
                <div class="p-col c-art">ARTICULO</div>
                <div class="p-col c-can">CANT</div>
                <div class="p-col c-uni">UND</div>
                <div class="p-col c-val">VALOR</div>
            </div>
            <div id="p-items" style="display: contents;"></div>
        </div>
        <div class="p-total">
            <span>TOTAL:</span>
            <span>$<span id="p-total-sum"></span></span>
        </div>
        <div class="p-footer">¡Gracias por su compra!</div>
    </div>

    <script>
        let inventory = {};
        const formatCLP = (n) => {
            let val = Math.round(parseFloat(n) || 0);
            return val.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        };

        fetch("https://docs.google.com/spreadsheets/d/1_XquIN3Qervm2532YWbA8-3O48RUbLgTp7ywRwIGx1I/export?format=csv&v=" + Date.now())
            .then(r => r.text())
            .then(csv => {
                csv.split("\n").slice(1).forEach(row => {
                    let cols = row.split(",");
                    if (cols[0]) inventory[cols[0].trim()] = { n: cols[1].trim(), p1: parseFloat(cols[2]), p2: parseFloat(cols[3]) };
                });
            });

        const icod = document.getElementById("inCod"), iart = document.getElementById("inArt"), ican = document.getElementById("inCan"), ipre = document.getElementById("inPre");

        ican.addEventListener('input', updatePrice);
        icod.oninput = () => {
            let code = icod.value.trim();
            if (code !== "" && inventory.hasOwnProperty(code)) {
                iart.value = inventory[code].n;
                updatePrice();
            } else { iart.value = ""; ipre.value = ""; }
        };

        function updatePrice() {
            let code = icod.value.trim();
            let item = inventory[code];
            if (item && ican.value) {
                ipre.value = Math.round((parseInt(ican.value) >= 3) ? item.p2 : item.p1);
            }
        }

        function addItem() {
            if (!icod.value.trim() || !iart.value.trim() || !ican.value || !ipre.value) {
                alert("Completa todos los campos correctamente.");
                return;
            }
            let subtotal = Math.round(ican.value * ipre.value);
            let tr = document.createElement("tr");
            tr.dataset.cod = icod.value.trim();
            tr.innerHTML = `
                <td>${tr.dataset.cod}</td>
                <td>${iart.value}</td>
                <td class="col-cant"><span contenteditable="true" class="editable v-can">${ican.value}</span></td>
                <td><span contenteditable="true" class="editable v-pre">${ipre.value}</span></td>
                <td class="row-subtotal">${formatCLP(subtotal)}</td>
                <td><button class="btn-del" onclick="removeItem(this)">ELIMINAR</button></td>
            `;
            document.getElementById("mainList").appendChild(tr);

            tr.querySelectorAll('.editable').forEach(cell => {
                cell.addEventListener('input', () => {
                    let raw = cell.innerText.replace(/\./g, '');
                    let clean = cell.classList.contains('v-can') ? raw.replace(/\D/g, '') : raw.replace(/[^\d]/g, '');

                    if (raw !== clean) {
                        cell.innerText = clean;
                        const range = document.createRange();
                        const sel = window.getSelection();
                        range.selectNodeContents(cell);
                        range.collapse(false);
                        sel.removeAllRanges();
                        sel.addRange(range);
                    }

                    let can = parseFloat(tr.querySelector('.v-can').innerText) || 0;
                    let preCell = tr.querySelector('.v-pre');
                    let item = inventory[tr.dataset.cod];

                    if (item && cell.classList.contains('v-can')) {
                        preCell.innerText = Math.round((can >= 3) ? item.p2 : item.p1);
                    }

                    let newSub = Math.round(can * (parseFloat(preCell.innerText) || 0));
                    tr.querySelector('.row-subtotal').innerText = formatCLP(newSub);
                    sync();
                });
            });
            sync(); icod.value = iart.value = ican.value = ipre.value = ""; icod.focus();
        }

        function removeItem(btn) {
            btn.closest('tr').remove();
            sync();
        }

        function sync() {
            let total = 0, pBox = document.getElementById("p-items");
            pBox.innerHTML = "";
            document.querySelectorAll("#mainList tr").forEach(r => {
                let can = r.querySelector('.v-can').innerText;
                let pre = r.querySelector('.v-pre').innerText;
                let subVal = Math.round(parseFloat(can) * parseFloat(pre));
                total += subVal;
                pBox.innerHTML += `
                    <div class="p-row">
                        <div class="p-col c-cod">${r.children[0].innerText}</div>
                        <div class="p-col c-art">${r.children[1].innerText}</div>
                        <div class="p-col c-can">${can}</div>
                        <div class="p-col c-uni">${formatCLP(pre)}</div>
                        <div class="p-col c-val">${formatCLP(subVal)}</div>
                    </div>`;
            });
            document.getElementById("totalShow").innerText = "Total: $" + formatCLP(total);
            document.getElementById("p-total-sum").innerText = formatCLP(total);

            let n = new Date();
            document.getElementById("p-dt").innerText = `FECHA: ${n.getFullYear()}/${n.getMonth() + 1}/${n.getDate()}, ${String(n.getHours()).padStart(2, '0')}:${String(n.getMinutes()).padStart(2, '0')}:${String(n.getSeconds()).padStart(2, '0')}`;
        }

        function clearList() { if (confirm("¿Limpiar?")) { document.getElementById("mainList").innerHTML = ""; sync(); } }
    </script>
</body>

</html>
