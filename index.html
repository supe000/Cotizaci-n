<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chino 99 Pro</title>
    <style>
        /* --- 手机操作界面（保持原样，不改动） --- */
        body { font-family: -apple-system, sans-serif; background: #f4f7f6; margin: 0; padding: 10px; }
        .app-container { max-width: 800px; margin: auto; background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 1px 5px rgba(0,0,0,0.1); }
        h2 { color: #00796b; text-align: center; margin: 5px 0 15px; }
        .inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 8px; margin-bottom: 15px; }
        input { padding: 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; width: 100%; box-sizing: border-box; outline: none; }
        .btn-row { display: flex; gap: 6px; margin: 10px 0; justify-content: center; flex-wrap: wrap; }
        button { padding: 14px 18px; border: none; border-radius: 4px; font-weight: bold; color: #fff; cursor: pointer; font-size: 15px; min-width: 90px; }
        .b-add { background: #4db6ac; flex: 1; }
        .b-print { background: #546e7a; flex: 1; }
        .b-clear { background: #e57373; flex: 1; }
        .table-wrapper { width: 100%; overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; min-width: 600px; }
        th { background: #e0f2f1; padding: 10px; border: 1px solid #eee; }
        td { padding: 10px; border: 1px solid #eee; text-align: center; }
        .editable { background: #fffde7; font-weight: bold; border: 1px solid #ffe082; display: block; padding: 8px; }
        .total-banner { text-align: right; font-size: 24px; font-weight: bold; margin-top: 15px; color: #c62828; }
        .btn-del { background: #ff5252; color: #fff; border: none; padding: 10px 0; border-radius: 4px; width: 90%; }

        /* --- 【核心修复】打印区域：回归标准表格 --- */
        @media print {
            @page { size: 80mm auto; margin: 0; }
            body > *:not(#print-receipt) { display: none !important; }
            #print-receipt {
                display: block !important;
                width: 76mm;
                margin: 0 auto;
                padding: 4mm 0;
                background: #fff;
                /* 修复点：换回标准宽度字体，不加粗，防止拉长 */
                font-family: "Courier New", Courier, monospace !important;
                color: #000 !important;
            }
            /* 强制干掉 WhatsApp 下划线 */
            #print-receipt * { text-decoration: none !important; font-weight: normal !important; }
            
            .p-header { text-align: center; margin-bottom: 3mm; border-bottom: 2px solid #000; padding-bottom: 2mm; }
            .p-name { font-size: 18pt; font-weight: bold !important; margin-bottom: 1mm; }
            .p-contact { font-size: 10pt; text-align: left; line-height: 1.2; }

            /* 关键：使用标准表格解决对齐问题 */
            .p-table { width: 100%; border-collapse: collapse; margin-top: 2mm; table-layout: fixed; }
            .p-th { border-bottom: 2px solid #000; font-size: 10pt; padding: 2mm 0; }
            .p-td { padding: 1.5mm 0; font-size: 10pt; word-wrap: break-word; vertical-align: top; }
            
            /* 严死锁定各列宽度 */
            .c-cod { width: 55px; text-align: left; }
            .c-art { text-align: left; }
            .c-can { width: 35px; text-align: center; }
            .c-uni { width: 60px; text-align: right; }
            .c-val { width: 70px; text-align: right; }

            .p-total-row { border-top: 2px solid #000; }
            .p-total-text { font-size: 18pt; font-weight: bold !important; padding-top: 3mm; text-align: right; }
            .p-footer { text-align: center; font-size: 10pt; margin-top: 8mm; border-top: 1px dashed #ccc; padding-top: 2mm; }
        }
        #print-receipt { display: none; }
    </style>
</head>
<body>
    <div class="app-container">
        <h2>✨ Chino 99</h2>
        <div class="inputs">
            <input id="inCod" placeholder="Código">
            <input id="inArt" placeholder="Producto">
            <input id="inCan" type="number" placeholder="Cant">
            <input id="inPre" type="number" placeholder="Precio ($)">
        </div>
        <div class="btn-row">
            <button class="b-add" onclick="addItem()">Agregar</button>
            <button class="b-print" onclick="window.print()">Imprimir</button>
            <button class="b-clear" onclick="clearList()">Limpiar</button>
        </div>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr><th style="width:15%">Cod</th><th style="width:25%">Art</th><th style="width:15%">Cant</th><th style="width:15%">Und</th><th style="width:15%">Val</th><th style="width:15%">Acc</th></tr>
                </thead>
                <tbody id="mainList"></tbody>
            </table>
        </div>
        <div class="total-banner" id="totalShow">Total: $0</div>
    </div>

    <div id="print-receipt">
        <div class="p-header">
            <div class="p-name">CHINO 99</div>
            <div class="p-contact">
                RUT: 76781806-8<br>
                WhatsApp: +56990987447<br>
                DIRECCIÓN: Sazié 2765<br>
                <span id="p-dt"></span>
            </div>
        </div>
        <table class="p-table">
            <thead>
                <tr>
                    <th class="p-th c-cod">COD</th>
                    <th class="p-th c-art">ARTICULO</th>
                    <th class="p-th c-can">CAN</th>
                    <th class="p-th c-uni">UND</th>
                    <th class="p-th c-val">VALOR</th>
                </tr>
            </thead>
            <tbody id="p-items"></tbody>
        </table>
        <div class="p-total-row">
            <div class="p-total-text">TOTAL: $<span id="p-total-sum"></span></div>
        </div>
        <div class="p-footer">¡Gracias por su compra!</div>
    </div>

    <script>
        let inventory = {};
        const formatCLP = (n) => Math.round(n || 0).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");

        fetch("https://docs.google.com/spreadsheets/d/1_XquIN3Qervm2532YWbA8-3O48RUbLgTp7ywRwIGx1I/export?format=csv&v=" + Date.now())
            .then(r => r.text())
            .then(csv => {
                csv.split("\n").slice(1).forEach(row => {
                    let cols = row.split(",");
                    if (cols[0]) inventory[cols[0].trim()] = { n: cols[1].trim(), p1: parseFloat(cols[2]), p2: parseFloat(cols[3]) };
                });
            });

        const icod = document.getElementById("inCod"), iart = document.getElementById("inArt"), ican = document.getElementById("inCan"), ipre = document.getElementById("inPre");
        
        icod.oninput = () => {
            let item = inventory[icod.value.trim()];
            if (item) { iart.value = item.n; updatePrice(); }
        };

        function updatePrice() {
            let item = inventory[icod.value.trim()];
            if (item && ican.value) ipre.value = Math.round(parseInt(ican.value) >= 3 ? item.p2 : item.p1);
        }
        ican.oninput = updatePrice;

        function addItem() {
            if (!iart.value || !ican.value || !ipre.value) return;
            let sub = Math.round(ican.value * ipre.value);
            let tr = document.createElement("tr");
            tr.innerHTML = `<td>${icod.value.trim()}</td><td>${iart.value}</td><td class="editable v-can" contenteditable="true">${ican.value}</td><td class="editable v-pre" contenteditable="true">${ipre.value}</td><td class="row-subtotal">${formatCLP(sub)}</td><td><button class="btn-del" onclick="this.closest('tr').remove();sync()">X</button></td>`;
            document.getElementById("mainList").appendChild(tr);
            tr.querySelectorAll('.editable').forEach(el => el.oninput = sync);
            sync(); icod.value=iart.value=ican.value=ipre.value=""; icod.focus();
        }

        function clearList() { if(confirm("¿Limpiar?")) { document.getElementById("mainList").innerHTML=""; sync(); } }

        function sync() {
            let total = 0, pBox = document.getElementById("p-items");
            pBox.innerHTML = "";
            document.querySelectorAll("#mainList tr").forEach(r => {
                let c = r.querySelector('.v-can').innerText, p = r.querySelector('.v-pre').innerText, s = Math.round(c*p);
                total += s;
                pBox.innerHTML += `<tr><td class="p-td c-cod">${r.children[0].innerText}</td><td class="p-td c-art">${r.children[1].innerText}</td><td class="p-td c-can">${c}</td><td class="p-td c-uni">${formatCLP(p)}</td><td class="p-td c-val">${formatCLP(s)}</td></tr>`;
            });
            document.getElementById("totalShow").innerText = "Total: $" + formatCLP(total);
            document.getElementById("p-total-sum").innerText = formatCLP(total);
            let n = new Date();
            document.getElementById("p-dt").innerText = `FECHA: ${n.toLocaleString()}`;
        }
    </script>
</body>
</html>
