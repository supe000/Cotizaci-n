<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="format-detection" content="telephone=no">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chino 99 Pro</title>
    <style>
        body {
            font-family: -apple-system, sans-serif;
            background: #f4f7f6;
            margin: 0;
            padding: 10px;
        }

        .app-container {
            max-width: 800px;
            margin: auto;
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 1px 5px rgba(0, 0, 0, 0.1);
        }

        h2 {
            color: #00796b;
            text-align: center;
            margin: 5px 0 15px;
            font-size: 22px;
        }

        h3 {
            margin: 16px 0 10px;
            color: #37474f;
        }

        .inputs {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 8px;
            margin-bottom: 15px;
        }

        input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
            width: 100%;
            box-sizing: border-box;
            outline: none;
        }

        .btn-row {
            display: flex;
            gap: 6px;
            margin: 10px 0;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 18px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            min-width: 80px;
        }

        .b-add {
            background: #4db6ac;
            flex: 1;
        }

        .b-print {
            background: #546e7a;
            flex: 1;
        }

        .b-clear {
            background: #e57373;
            flex: 1;
        }

        .b-history-clear {
            background: #8d6e63;
        }

        .table-wrapper {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin-top: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            min-width: 600px;
            table-layout: fixed;
        }

        th {
            background: #e0f2f1;
            padding: 10px;
            border: 1px solid #eee;
            color: #333;
        }

        td {
            padding: 10px;
            border: 1px solid #eee;
            text-align: center;
            word-break: break-all;
        }

        .col-cant {
            width: 15% !important;
        }

        .editable {
            background: #fffde7;
            font-weight: bold;
            outline: none;
            border: 1px solid #ffe082;
            display: block;
            padding: 8px 4px;
            min-height: 20px;
        }

        .total-banner {
            text-align: right;
            font-size: 24px;
            font-weight: bold;
            margin-top: 15px;
            color: #c62828;
        }

        .btn-del {
            background: #ff5252;
            color: #fff;
            border: none;
            padding: 10px 0;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            width: 90%;
            cursor: pointer;
            outline: none;
            box-shadow: none;
            -webkit-appearance: none;
        }

        .history-box {
            margin-top: 18px;
            border-top: 1px solid #eceff1;
            padding-top: 12px;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .history-item {
            border: 1px solid #dfe6e9;
            border-radius: 8px;
            padding: 10px;
            background: #fafafa;
        }

        .history-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .history-meta {
            font-size: 13px;
            color: #455a64;
            font-weight: bold;
        }

        .history-preview {
            margin-top: 6px;
            font-size: 12px;
            color: #607d8b;
            line-height: 1.4;
            word-break: break-word;
        }

        .history-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .btn-history-load {
            background: #26a69a;
        }

        .btn-history-del {
            background: #ef5350;
        }

        .empty-history {
            color: #78909c;
            font-size: 13px;
            padding: 10px 0;
        }

        @media print {
            @page {
                size: 80mm;
                margin: 0;
            }

            a {
                text-decoration: none !important;
                color: #000 !important;
            }

            body>*:not(#print-receipt) {
                display: none !important;
            }

            #print-receipt {
                display: block !important;
                width: 72mm;
                margin: 0 auto;
                padding: 2mm 2mm;
                background: #fff;
                font-family: monospace;
                font-variant-numeric: tabular-nums;
                color: #000;
                font-weight: bold;
                font-size: 8.5pt;
                line-height: 1.2;
            }

            .p-header {
                padding-bottom: 2mm;
                margin-bottom: 2mm;
                text-align: center;
            }

            .p-name {
                font-size: 18pt;
                font-weight: bold;
                margin-bottom: 3mm;
                text-align: center;
            }

            .p-contact {
                font-size: 9pt;
                line-height: 1.2;
                text-align: left;
            }

            .p-table {
                display: table;
                width: 100%;
                border-collapse: collapse;
            }

            .p-row {
                display: table-row;
            }

            .p-row.p-head {
                font-weight: bold;
                border-bottom: 1px dashed #000;
            }

            .p-col {
                display: table-cell;
                letter-spacing: 0.2px;
                padding: 0.5mm 1;
                font-size: 8pt;
            }

            .c-cod {
                width: 20%;
                text-align: left;
            }

            .c-art {
                width: 36%;
                text-align: left;
                word-break: break-word;
                line-height: 1.0;
            }

            .c-can {
                width: 10%;
                text-align: center;
            }

            .c-uni {
                width: 16%;
                text-align: center;
            }

            .c-val {
                width: 18%;
                text-align: right;
            }

            .p-total {
                display: flex;
                justify-content: space-between;
                font-size: 10pt;
                font-weight: normal;
                margin-top: 2mm;
                border-top: 1px dashed #000;
                padding-top: 1mm;
            }

            .p-footer {
                text-align: center;
                font-size: 10pt;
                margin-top: 5mm;
            }
        }

        #print-receipt {
            display: none;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <h2>✨ Chino 99</h2>

        <div class="inputs">
            <input id="inCod" placeholder="Código">
            <input id="inArt" placeholder="Producto">
            <input id="inCan" type="number" placeholder="Cantidad" oninput="this.value=this.value.replace(/\D/g,'')">
            <input id="inPre" type="number" placeholder="Unidad ($)"
                oninput="this.value=this.value.replace(/[^\d.]/g,'')">
        </div>

        <div class="btn-row">
            <button class="b-add" onclick="addItem()">Agregar</button>
            <button class="b-print" onclick="printReceipt()">Imprimir</button>
            <button class="b-clear" onclick="clearList()">Limpiar</button>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th style="width:15%">Código</th>
                        <th style="width:25%">Producto</th>
                        <th class="col-cant">Cant</th>
                        <th style="width:15%">Unidad</th>
                        <th style="width:15%">Valor</th>
                        <th style="width:15%">Acciones</th>
                    </tr>
                </thead>
                <tbody id="mainList"></tbody>
            </table>
        </div>

        <div class="total-banner" id="totalShow">Total: $0</div>

        <div class="history-box">
            <div class="btn-row" style="justify-content:space-between;">
                <h3 style="margin:0;">Historial</h3>
                <button class="b-history-clear" onclick="clearAllHistory()">Borrar historial</button>
            </div>
            <div id="historyList" class="history-list"></div>
        </div>
    </div>

    <div id="print-receipt">
        <div class="p-header">
            <div class="p-name">CHINO 99</div>
            <div class="p-contact">
                RUT: 76781806-8<br>
                WhatsApp: +56990987447<br>
                DIRECCIÓN: SAZIE 2765<br>
                <span id="p-dt"></span>
            </div>
        </div>
        <div class="p-table">
            <div class="p-row p-head">
                <div class="p-col c-cod">COD</div>
                <div class="p-col c-art">ARTICULO</div>
                <div class="p-col c-can">CANT</div>
                <div class="p-col c-uni">UND</div>
                <div class="p-col c-val">VALOR</div>
            </div>
            <div id="p-items" style="display: contents;"></div>
        </div>
        <div class="p-total">
            <span>TOTAL:</span>
            <span>$<span id="p-total-sum"></span></span>
        </div>
        <div class="p-footer">¡Gracias por su compra!</div>
    </div>

    <script>
        let inventory = {};
        const STORAGE_KEY = "chino99_history_v1";

        const formatCLP = (n) => {
            let val = Math.round(parseFloat(n) || 0);
            return val.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        };

        fetch("https://docs.google.com/spreadsheets/d/1_XquIN3Qervm2532YWbA8-3O48RUbLgTp7ywRwIGx1I/export?format=csv&v=" + Date.now())
            .then(r => r.text())
            .then(csv => {
                csv.split("\n").slice(1).forEach(row => {
                    let cols = row.split(",");
                    if (cols[0]) {
                        inventory[cols[0].trim().toUpperCase()] = {
                            n: (cols[1] || "").trim(),
                            p1: parseFloat(cols[2]) || 0,
                            p2: parseFloat(cols[3]) || 0
                        };
                    }
                });
            });

        const icod = document.getElementById("inCod");
        const iart = document.getElementById("inArt");
        const ican = document.getElementById("inCan");
        const ipre = document.getElementById("inPre");

        ican.addEventListener("input", updatePrice);

        icod.oninput = () => {
            let code = icod.value.trim().toUpperCase();
            if (code !== "" && inventory.hasOwnProperty(code)) {
                iart.value = inventory[code].n;
                updatePrice();
            } else {
                iart.value = "";
                ipre.value = "";
            }
        };

        function updatePrice() {
            let code = icod.value.trim().toUpperCase();
            let item = inventory[code];
            if (item && ican.value) {
                ipre.value = Math.round((parseInt(ican.value) >= 3) ? item.p2 : item.p1);
            }
        }

        function addItem() {
            if (!icod.value.trim() || !iart.value.trim() || !ican.value || !ipre.value) {
                alert("Completa todos los campos correctamente.");
                return;
            }

            const cod = icod.value.trim().toUpperCase();
            const art = iart.value.trim();
            const can = parseFloat(ican.value) || 0;
            const pre = parseFloat(ipre.value) || 0;

            // 找相同 Código（统一大写后比较）
            const existingRow = Array.from(document.querySelectorAll("#mainList tr"))
                .find(tr => (tr.dataset.cod || "").toUpperCase() === cod);

            if (existingRow) {
                const canCell = existingRow.querySelector(".v-can");
                const preCell = existingRow.querySelector(".v-pre");

                let oldCan = parseFloat(canCell.innerText) || 0;
                let newCan = oldCan + can;

                // 更新数量
                canCell.innerText = newCan;

                // 重新按总数量计算价格
                let item = inventory[cod];
                let newPre = pre;

                if (item) {
                    newPre = Math.round((newCan >= 3) ? item.p2 : item.p1);
                }

                preCell.innerText = newPre;

                // 重算小计
                let newSub = Math.round(newCan * newPre);
                existingRow.querySelector(".row-subtotal").innerText = formatCLP(newSub);

                sync();

                icod.value = "";
                iart.value = "";
                ican.value = "";
                ipre.value = "";
                icod.focus();
                return;
            }

            let subtotal = Math.round(can * pre);
            let tr = document.createElement("tr");
            tr.dataset.cod = cod;

            tr.innerHTML = `
        <td>${cod}</td>
        <td>${art}</td>
        <td class="col-cant"><span contenteditable="true" class="editable v-can">${can}</span></td>
        <td><span contenteditable="true" class="editable v-pre">${pre}</span></td>
        <td class="row-subtotal">${formatCLP(subtotal)}</td>
        <td><button class="btn-del" onclick="removeItem(this)">ELIMINAR</button></td>
    `;

            document.getElementById("mainList").appendChild(tr);
            bindEditableRow(tr);

            sync();

            icod.value = "";
            iart.value = "";
            ican.value = "";
            ipre.value = "";
            icod.focus();
        }

        function bindEditableRow(tr) {
            tr.querySelectorAll(".editable").forEach(cell => {
                cell.addEventListener("input", () => {
                    let raw = cell.innerText.replace(/\./g, "");
                    let clean = cell.classList.contains("v-can")
                        ? raw.replace(/\D/g, "")
                        : raw.replace(/[^\d]/g, "");

                    if (raw !== clean) {
                        cell.innerText = clean;
                        const range = document.createRange();
                        const sel = window.getSelection();
                        range.selectNodeContents(cell);
                        range.collapse(false);
                        sel.removeAllRanges();
                        sel.addRange(range);
                    }

                    let can = parseFloat(tr.querySelector(".v-can").innerText) || 0;
                    let preCell = tr.querySelector(".v-pre");
                    let item = inventory[tr.dataset.cod];

                    if (item && cell.classList.contains("v-can")) {
                        preCell.innerText = Math.round((can >= 3) ? item.p2 : item.p1);
                    }

                    let newSub = Math.round(can * (parseFloat(preCell.innerText) || 0));
                    tr.querySelector(".row-subtotal").innerText = formatCLP(newSub);
                    sync();
                });
            });
        }

        function removeItem(btn) {
            btn.closest("tr").remove();
            sync();
        }

        function getCurrentItems() {
            let items = [];

            document.querySelectorAll("#mainList tr").forEach(r => {
                let cod = r.children[0].innerText;
                let art = r.children[1].innerText;
                let can = r.querySelector(".v-can").innerText;
                let pre = r.querySelector(".v-pre").innerText;
                let sub = r.querySelector(".row-subtotal").innerText.replace(/\./g, "");

                items.push({ cod, art, can, pre, sub });
            });

            return items;
        }

        function getCurrentTotalRaw() {
            return document.getElementById("p-total-sum").innerText.replace(/\./g, "");
        }

        function buildHistoryEntry() {
            const items = getCurrentItems();
            const total = getCurrentTotalRaw();

            if (!items.length) return null;

            return {
                id: Date.now(),
                createdAt: new Date().toISOString(),
                items,
                total
            };
        }

        function getHistory() {
            try {
                return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
            } catch {
                return [];
            }
        }

        function saveHistory(list) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
        }

        function addCurrentToHistory() {
            const entry = buildHistoryEntry();
            if (!entry) return;

            let history = getHistory();

            const serialized = JSON.stringify({
                items: entry.items,
                total: entry.total
            });

            history = history.filter(h => JSON.stringify({
                items: h.items,
                total: h.total
            }) !== serialized);

            history.unshift(entry);
            history = history.slice(0, 100);

            saveHistory(history);
            renderHistory();
        }

        function loadHistoryEntry(id) {
            const history = getHistory();
            const entry = history.find(h => String(h.id) === String(id));
            if (!entry) return;

            document.getElementById("mainList").innerHTML = "";

            entry.items.forEach(item => {
                let tr = document.createElement("tr");
                tr.dataset.cod = item.cod;

                tr.innerHTML = `
                    <td>${item.cod}</td>
                    <td>${item.art}</td>
                    <td class="col-cant"><span contenteditable="true" class="editable v-can">${item.can}</span></td>
                    <td><span contenteditable="true" class="editable v-pre">${item.pre}</span></td>
                    <td class="row-subtotal">${formatCLP(item.sub)}</td>
                    <td><button class="btn-del" onclick="removeItem(this)">ELIMINAR</button></td>
                `;

                document.getElementById("mainList").appendChild(tr);
                bindEditableRow(tr);
            });

            sync();
            window.scrollTo({ top: 0, behavior: "smooth" });
        }

        function deleteHistoryEntry(id) {
            if (!confirm("¿Eliminar este registro?")) return;

            let history = getHistory().filter(h => String(h.id) !== String(id));
            saveHistory(history);
            renderHistory();
        }

        function clearAllHistory() {
            if (!confirm("¿Borrar todo el historial?")) return;
            localStorage.removeItem(STORAGE_KEY);
            renderHistory();
        }

        function renderHistory() {
            const box = document.getElementById("historyList");
            const history = getHistory();

            if (!history.length) {
                box.innerHTML = `<div class="empty-history">No hay historial guardado.</div>`;
                return;
            }

            box.innerHTML = history.map(h => {
                const d = new Date(h.createdAt);
                const fecha = `${d.getFullYear()}/${String(d.getMonth() + 1).padStart(2, "0")}/${String(d.getDate()).padStart(2, "0")} ${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}`;
                const preview = h.items.slice(0, 3).map(i => `${i.cod} - ${i.art}`).join(" | ");

                return `
                    <div class="history-item">
                        <div class="history-top">
                            <div class="history-meta">${fecha} · ${h.items.length} ítem(s) · Total: $${formatCLP(h.total)}</div>
                        </div>
                        <div class="history-preview">${preview || ""}</div>
                        <div class="history-actions">
                            <button class="btn-history-load" onclick="loadHistoryEntry('${h.id}')">Cargar</button>
                            <button class="btn-history-del" onclick="deleteHistoryEntry('${h.id}')">Eliminar</button>
                        </div>
                    </div>
                `;
            }).join("");
        }

        function sync() {
            let total = 0;
            let pBox = document.getElementById("p-items");
            pBox.innerHTML = "";

            document.querySelectorAll("#mainList tr").forEach(r => {
                let can = r.querySelector(".v-can").innerText;
                let pre = r.querySelector(".v-pre").innerText;
                let subVal = Math.round((parseFloat(can) || 0) * (parseFloat(pre) || 0));

                total += subVal;

                pBox.innerHTML += `
                    <div class="p-row">
                        <div class="p-col c-cod">${r.children[0].innerText}</div>
                        <div class="p-col c-art">${r.children[1].innerText}</div>
                        <div class="p-col c-can">${can}</div>
                        <div class="p-col c-uni">${formatCLP(pre)}</div>
                        <div class="p-col c-val">${formatCLP(subVal)}</div>
                    </div>
                `;
            });

            document.getElementById("totalShow").innerText = "Total: $" + formatCLP(total);
            document.getElementById("p-total-sum").innerText = formatCLP(total);

            let n = new Date();
            document.getElementById("p-dt").innerText =
                `FECHA: ${n.getFullYear()}/${n.getMonth() + 1}/${n.getDate()}, ${String(n.getHours()).padStart(2, '0')}:${String(n.getMinutes()).padStart(2, '0')}:${String(n.getSeconds()).padStart(2, '0')}`;
        }

        function printReceipt() {
            sync();

            const ua = navigator.userAgent || "";
            const isWindows = /Windows/i.test(ua);

            if (isWindows) {
                addCurrentToHistory();
                setTimeout(() => {
                    window.print();
                }, 200);
                return;
            }

            let items = getCurrentItems();
            let total = getCurrentTotalRaw();

            addCurrentToHistory();

            let url =
                "http://192.168.1.200:3000/print?data=" +
                encodeURIComponent(JSON.stringify({ items, total }));

            window.open(url);
        }

        function clearList() {
            if (confirm("¿Limpiar?")) {
                document.getElementById("mainList").innerHTML = "";
                sync();
            }
        }

        renderHistory();
        sync();
    </script>
</body>

</html>
