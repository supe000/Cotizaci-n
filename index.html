<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chino 99 Pro</title>
    <style>
        /* --- 手机操作界面（恢复您最满意的样式） --- */
        body { font-family: -apple-system, sans-serif; background: #f4f7f6; margin: 0; padding: 10px; }
        .app-container { max-width: 800px; margin: auto; background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 1px 5px rgba(0,0,0,0.1); }
        h2 { color: #00796b; text-align: center; margin: 5px 0 15px; }
        .inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 8px; margin-bottom: 15px; }
        input { padding: 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; width: 100%; box-sizing: border-box; }
        
        .btn-row { display: flex; gap: 6px; margin: 10px 0; }
        button { padding: 14px; border: none; border-radius: 4px; font-weight: bold; color: #fff; cursor: pointer; font-size: 15px; flex: 1; }
        .b-add { background: #4db6ac; }
        .b-print { background: #546e7a; }
        .b-clear { background: #e57373; }

        .table-wrapper { width: 100%; overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; min-width: 500px; }
        th { background: #e0f2f1; padding: 10px; border: 1px solid #eee; }
        td { padding: 10px; border: 1px solid #eee; text-align: center; }
        
        .editable { background: #fffde7; font-weight: bold; border: 1px solid #ffe082; padding: 6px; border-radius: 3px; }
        .total-banner { text-align: right; font-size: 24px; font-weight: bold; margin-top: 15px; color: #c62828; }
        .btn-del { background: #ff5252; color: white; border: none; padding: 8px 12px; border-radius: 4px; }

        /* --- 【核心修复】打印样式：等宽排版 --- */
        @media print {
            @page { size: 80mm auto; margin: 0; }
            body > *:not(#print-receipt) { display: none !important; }
            #print-receipt {
                display: block !important;
                width: 72mm; /* 稍微缩小宽度，防止边缘切除 */
                margin: 0 auto;
                padding: 5mm 0;
                /* 使用等宽字体，解决所有对齐问题 */
                font-family: 'Courier New', Courier, monospace !important; 
                color: #000 !important;
                line-height: 1.2;
            }
            .p-header { text-align: center; margin-bottom: 4mm; }
            .p-name { font-size: 22pt; font-weight: bold; }
            .p-contact { font-size: 10pt; margin-top: 2mm; }

            /* 模拟虚线，热敏机打印最清晰 */
            .p-line { border-bottom: 1px dashed #000; margin: 2mm 0; }
            
            /* 表头对齐格式 */
            .p-row { display: flex; justify-content: space-between; font-size: 9pt; padding: 1mm 0; }
            .p-col-cod { width: 15mm; }
            .p-col-art { flex: 1; padding: 0 1mm; }
            .p-col-can { width: 8mm; text-align: center; }
            .p-col-und { width: 15mm; text-align: right; }
            .p-col-val { width: 18mm; text-align: right; }

            .p-total-box { 
                margin-top: 4mm; 
                border-top: 2px solid #000; 
                padding-top: 2mm; 
                text-align: right; 
                font-size: 18pt; 
                font-weight: bold; 
            }
            .p-footer { text-align: center; font-size: 10pt; margin-top: 10mm; border-top: 1px dashed #000; padding-top: 2mm; }
        }
        #print-receipt { display: none; }
    </style>
</head>
<body>
    <div class="app-container">
        <h2>✨ Chino 99</h2>
        <div class="inputs">
            <input id="inCod" placeholder="Código">
            <input id="inArt" placeholder="Producto">
            <input id="inCan" type="number" placeholder="Cant">
            <input id="inPre" type="number" placeholder="Precio ($)">
        </div>
        <div class="btn-row">
            <button class="b-add" onclick="addItem()">Agregar</button>
            <button class="b-print" onclick="window.print()">Imprimir</button>
            <button class="b-clear" onclick="clearList()">Limpiar</button>
        </div>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr><th>Cod</th><th>Art</th><th>Cant</th><th>Und</th><th>Val</th><th>Acc</th></tr>
                </thead>
                <tbody id="mainList"></tbody>
            </table>
        </div>
        <div class="total-banner" id="totalShow">Total: $0</div>
    </div>

    <div id="print-receipt">
        <div class="p-header">
            <div class="p-name">CHINO 99</div>
            <div class="p-contact">
                RUT: 76781806-8<br>
                DIRECCIÓN: Sazié 2765<br>
                WhatsApp: +56990987447<br>
                <span id="p-dt"></span>
            </div>
        </div>
        <div class="p-line"></div>
        <div class="p-row" style="font-weight:bold">
            <span class="p-col-cod">COD</span>
            <span class="p-col-art">ARTICULO</span>
            <span class="p-col-can">CAN</span>
            <span class="p-col-und">UND</span>
            <span class="p-col-val">VALOR</span>
        </div>
        <div class="p-line"></div>
        <div id="p-items"></div>
        <div class="p-total-box">TOTAL: $<span id="p-total-sum"></span></div>
        <div class="p-footer">¡Gracias por su compra!</div>
    </div>

    <script>
        let inventory = {};
        const formatCLP = (n) => Math.round(n || 0).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");

        fetch("https://docs.google.com/spreadsheets/d/1_XquIN3Qervm2532YWbA8-3O48RUbLgTp7ywRwIGx1I/export?format=csv&v=" + Date.now())
            .then(r => r.text())
            .then(csv => {
                csv.split("\n").slice(1).forEach(row => {
                    let cols = row.split(",");
                    if (cols[0]) inventory[cols[0].trim()] = { n: cols[1].trim(), p1: parseFloat(cols[2]), p2: parseFloat(cols[3]) };
                });
            });

        const icod = document.getElementById("inCod"), iart = document.getElementById("inArt"), ican = document.getElementById("inCan"), ipre = document.getElementById("inPre");
        
        icod.oninput = () => {
            let item = inventory[icod.value.trim()];
            if (item) { iart.value = item.n; updatePrice(); }
        };

        function updatePrice() {
            let item = inventory[icod.value.trim()];
            if (item && ican.value) ipre.value = Math.round(parseInt(ican.value) >= 3 ? item.p2 : item.p1);
        }
        ican.oninput = updatePrice;

        function addItem() {
            // 恢复必填提示
            if (!icod.value || !ican.value || !ipre.value) {
                alert("Por favor complete Código, Cantidad y Precio.");
                return;
            }
            let sub = Math.round(ican.value * ipre.value);
            let tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${icod.value}</td>
                <td>${iart.value}</td>
                <td><span class="editable v-can" contenteditable="true">${ican.value}</span></td>
                <td><span class="editable v-pre" contenteditable="true">${ipre.value}</span></td>
                <td class="row-subtotal">${formatCLP(sub)}</td>
                <td><button class="btn-del" onclick="this.closest('tr').remove();sync()">Eliminar</button></td>
            `;
            document.getElementById("mainList").appendChild(tr);
            tr.querySelectorAll('.editable').forEach(el => el.oninput = sync);
            sync(); 
            icod.value = iart.value = ican.value = ipre.value = ""; 
            icod.focus();
        }

        function clearList() { if(confirm("¿Limpiar todo?")) { document.getElementById("mainList").innerHTML=""; sync(); } }

        function sync() {
            let total = 0, pBox = document.getElementById("p-items");
            pBox.innerHTML = "";
            document.querySelectorAll("#mainList tr").forEach(r => {
                let cod = r.children[0].innerText;
                let art = r.children[1].innerText;
                let c = r.querySelector('.v-can').innerText;
                let p = r.querySelector('.v-pre').innerText;
                let s = Math.round(c*p);
                total += s;
                // 打印行：使用 Flex 布局确保每一列对齐
                pBox.innerHTML += `
                    <div class="p-row">
                        <span class="p-col-cod">${cod}</span>
                        <span class="p-col-art">${art}</span>
                        <span class="p-col-can">${c}</span>
                        <span class="p-col-und">${formatCLP(p)}</span>
                        <span class="p-col-val">${formatCLP(s)}</span>
                    </div>`;
                r.querySelector('.row-subtotal').innerText = formatCLP(s);
            });
            document.getElementById("totalShow").innerText = "Total: $" + formatCLP(total);
            document.getElementById("p-total-sum").innerText = formatCLP(total);
            document.getElementById("p-dt").innerText = "FECHA: " + new Date().toLocaleString();
        }
    </script>
</body>
</html>
